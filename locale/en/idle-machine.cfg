[item-name]
idle-machine=Idle Machine

[item-description]
idle-machine=A 3x3 machine that levels up over time, allowing for upgrades to speed or item variety.

[entity-name]
idle-machine=Idle Machine

[entity-description]
idle-machine=A mysterious machine that seems to create value from nothing but time and fuel.

[recipe-name]
idle-machine=Idle Machine

[mod-setting-name]
idle-machine-electricity-kw=Idle machine electricity usage (kW)
idle-machine-generation-seconds=Idle machine generation interval (seconds)
idle-machine-levelup-seconds=Idle machine level-up interval (seconds)
idle-machine-show-message-log=Show machine event log

[mod-setting-description]
idle-machine-electricity-kw=Power draw per machine in kilowatts. Takes effect after restarting the game because it changes entity prototype data.
idle-machine-generation-seconds=Base seconds per generated item. Range: 3 to 180 seconds (default 10). Existing machines update immediately; speed upgrades still apply on top.
idle-machine-levelup-seconds=Seconds of powered operation required for each level-up. Range: 30 to 7200 seconds (default 600).
idle-machine-show-message-log=If enabled, the Machine Event Log is shown in the Idle Machine GUI.
